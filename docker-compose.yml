services:
  db:
    image: postgres:15-alpine
    container_name: ecole_db_container
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=ecole_password
      - POSTGRES_DB=ecole2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: